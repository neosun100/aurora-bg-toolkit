# Optimization v3 — even tighter timeout.
# Result: similar 3-6s downtime range.
# Applied change vs v2:
#   - connectTimeout 2000 -> 1000 (1s TCP guard)
name: v3-aggressive-timeout
description: connectTimeout=1s; similar downtime range as v2 but more aggressive failover.

database:
  port: 4488
  database: demo
  tableTemplate: "table_${CONFIG}_${SUFFIX}"
  user: admin

jdbc:
  wrapperPlugins:
    - failover2
    - efm2
    - bg
  bgHighMs: 50
  connectTimeout: 1000
  socketTimeout: 3000
  failureDetectionTime: null
  failureDetectionInterval: null
  failureDetectionCount: null
  wrapperLoggerLevel: FINEST

hikari:
  maximumPoolSize: 10
  minimumIdle: 10
  initializationFailTimeout: -1
  connectionTimeoutMs: 5000
  idleTimeoutMs: 30000
  maxLifetimeMs: 60000
  keepaliveTimeMs: 60000
  validationTimeoutMs: 5000
  connectionInitSql: "select 1 from dual"
  connectionTestQuery: "SELECT 1"
  exceptionOverrideClassName: software.amazon.jdbc.util.HikariCPSQLException

workload:
  threads: 4
  intervalMs: 100
  weights:
    read: 9
    insert: 2
    update: 1
  retry:
    enabled: true
    delayMs: 50
